[build]
  command = "npm run build"
  functions = "netlify/functions"
  publish = "dist"

[functions]
  node_bundler = "esbuild"

# Environment variables - add your SUPABASE_SERVICE_ROLE_KEY in the Netlify dashboard
[env]
  [env.production]
    [env.production.environment]
      SUPABASE_SERVICE_ROLE_KEY = ""

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
